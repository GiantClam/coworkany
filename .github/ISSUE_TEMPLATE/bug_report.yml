name: Bug report
description: Report a reproducible problem in CoworkAny
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The desktop app fails to restore interrupted tasks after restart.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - desktop
        - sidecar
        - rag-service
        - browser-use-service
        - docs
        - packaging/release
        - unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give a minimal sequence that reproduces the issue.
      placeholder: |
        1. Start the desktop app
        2. Open a workspace
        3. Start a task
        4. Restart the app
        5. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Node/Bun versions, and app mode if relevant.
      placeholder: macOS 15 arm64, Node 22.22.1, Bun 1.3.9
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      render: shell

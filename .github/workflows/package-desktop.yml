name: Package Desktop

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to package"
        required: true
        default: all
        type: choice
        options:
          - all
          - linux-x64
          - windows-x64
          - macos-x64
          - macos-arm64
      version_label:
        description: "Optional label added to artifact names"
        required: false
        default: manual
        type: string

permissions:
  contents: read

concurrency:
  group: package-desktop-${{ inputs.version_label || github.run_id }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - runner: macos-15
            target: aarch64-apple-darwin
            artifact_name: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Bun
        if: ${{ inputs.platform == 'all' || inputs.platform == matrix.artifact_name }}
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && secrets.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libappindicator3-dev

      - name: Install desktop dependencies
        if: ${{ inputs.platform == 'all' || inputs.platform == matrix.artifact_name }}
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        if: ${{ inputs.platform == 'all' || inputs.platform == matrix.artifact_name }}
        working-directory: sidecar
        run: bun install

      - name: Build desktop bundle
        if: ${{ inputs.platform == 'all' || inputs.platform == matrix.artifact_name }}
        working-directory: desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          # npm run tauri build
          npm run tauri -- build --target ${{ matrix.target }}

      - name: Sign and notarize macOS app bundle
        if: runner.os == 'macOS' && (inputs.platform == 'all' || inputs.platform == matrix.artifact_name)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bash desktop/scripts/macos-sign-and-notarize.sh \
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/CoworkAny.app

      - name: Upload desktop bundle
        if: ${{ inputs.platform == 'all' || inputs.platform == matrix.artifact_name }}
        uses: actions/upload-artifact@v7
        with:
          name: coworkany-${{ inputs.version_label || 'manual' }}-${{ matrix.artifact_name }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
          retention-days: 14

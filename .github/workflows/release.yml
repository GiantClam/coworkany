name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean
      draft:
        description: 'Create the GitHub release as a draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install

      - name: Run release readiness gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          E2E_AIBERM_API_KEY: ${{ secrets.E2E_AIBERM_API_KEY }}
          E2E_AIBERM_BASE_URL: ${{ secrets.E2E_AIBERM_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run test:codex -- --mode release

      - name: Upload Codex release gate report
        uses: actions/upload-artifact@v4
        with:
          name: codex-test-release-${{ env.RELEASE_TAG }}
          path: artifacts/codex-test/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload release readiness report
        uses: actions/upload-artifact@v4
        with:
          name: coworkany-release-readiness-${{ env.RELEASE_TAG }}
          path: artifacts/release-readiness/**
          if-no-files-found: error
          retention-days: 14

  release:
    needs: readiness
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && secrets.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev
          
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install
        
      - name: Build desktop bundle
        working-directory: desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          # npm run tauri build
          npm run tauri -- build --target ${{ matrix.target }}

      - name: Sign and notarize macOS app bundle
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bash desktop/scripts/macos-sign-and-notarize.sh \
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/CoworkAny.app

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'CoworkAny ${{ env.RELEASE_TAG }}'
          body: 'See the release notes for details.'
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**

      - name: Upload release desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: coworkany-release-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
          retention-days: 14

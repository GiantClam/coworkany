name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean
      draft:
        description: 'Create the GitHub release as a draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev
          
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install
        
      - name: Build desktop bundle
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'CoworkAny ${{ env.RELEASE_TAG }}'
          body: 'See the release notes for details.'
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**

      - name: Upload release desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: coworkany-release-${{ env.RELEASE_TAG }}-${{ matrix.artifact_name }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
          retention-days: 14

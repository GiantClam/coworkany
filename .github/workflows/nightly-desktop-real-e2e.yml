name: Nightly Desktop Real E2E

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  desktop-tier2-macos:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install

      - name: Run Codex nightly tier2 gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          E2E_AIBERM_API_KEY: ${{ secrets.E2E_AIBERM_API_KEY }}
          E2E_AIBERM_BASE_URL: ${{ secrets.E2E_AIBERM_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_MODEL_ID: ${{ secrets.TEST_MODEL_ID }}
          COWORKANY_REQUIRE_REAL_MODEL_SMOKE: '1'
        run: npm run test:codex -- --mode nightly --subset nightly-tier2

      - name: Upload Codex nightly tier2 report
        uses: actions/upload-artifact@v4
        with:
          name: codex-test-nightly-tier2
          path: artifacts/codex-test/**
          if-no-files-found: error
          retention-days: 14

  desktop-tier3-macos:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install

      - name: Run Codex nightly tier3 gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          E2E_AIBERM_API_KEY: ${{ secrets.E2E_AIBERM_API_KEY }}
          E2E_AIBERM_BASE_URL: ${{ secrets.E2E_AIBERM_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_MODEL_ID: ${{ secrets.TEST_MODEL_ID }}
        run: npm run test:codex -- --mode nightly --subset nightly-tier3

      - name: Upload Codex nightly tier3 report
        uses: actions/upload-artifact@v4
        with:
          name: codex-test-nightly-tier3
          path: artifacts/codex-test/**
          if-no-files-found: error
          retention-days: 14

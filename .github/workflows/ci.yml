name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
        
      - name: TypeScript type check (desktop)
        working-directory: desktop
        run: npx tsc --noEmit
        
      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install
        
      - name: TypeScript type check (sidecar)
        working-directory: sidecar
        run: npm run typecheck

      - name: Run sidecar CI tests
        working-directory: sidecar
        run: npm run test:ci

      - name: Run sidecar assistant-ui stream contracts
        working-directory: sidecar
        run: npm run test:assistant-ui-contracts

  test-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run desktop acceptance suite
        working-directory: desktop
        run: npm run test:ci

  test-desktop-e2e-smoke-macos:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install

      - name: Run desktop real e2e tier1 (critical chain)
        working-directory: desktop
        run: npm run test:e2e:tier1

  build-tauri:
    needs: [lint-and-typecheck, test-desktop, test-desktop-e2e-smoke-macos]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libappindicator3-dev
          
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: bun install
        
      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload CI desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: coworkany-ci-${{ matrix.artifact_name }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
          retention-days: 7
